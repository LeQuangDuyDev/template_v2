<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Template Trб»Қ</title>
<link rel="icon" type="image/png" href="logo.png" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f8f7f4;--surface:#ffffff;--border:#e5e3dc;--border2:#d1cfc8;
    --text:#1a1a1a;--text2:#666;--text3:#aaa;
    --blue-bg:#eff6ff;--blue-border:#bfdbfe;--blue-text:#1d4ed8;
    --red-bg:#fef2f2;--red-border:#fecaca;--red-text:#dc2626;
    --green-bg:#f0fdf4;--green-border:#bbf7d0;--green-text:#15803d;
    --radius:10px;--radius-sm:7px;
  }
  [data-theme="dark"]{
    --bg:#111110;--surface:#1c1c1a;--border:#2e2e2b;--border2:#3d3d3a;
    --text:#f0ede6;--text2:#9a9790;--text3:#555;
    --blue-bg:#1e2d40;--blue-border:#2563eb;--blue-text:#93c5fd;
    --red-bg:#2d1515;--red-border:#dc2626;--red-text:#fca5a5;
    --green-bg:#14260f;--green-border:#16a34a;--green-text:#86efac;
  }
  @media(prefers-color-scheme:dark){:root:not([data-theme]){
    --bg:#111110;--surface:#1c1c1a;--border:#2e2e2b;--border2:#3d3d3a;
    --text:#f0ede6;--text2:#9a9790;--text3:#555;
    --blue-bg:#1e2d40;--blue-border:#2563eb;--blue-text:#93c5fd;
    --red-bg:#2d1515;--red-border:#dc2626;--red-text:#fca5a5;
    --green-bg:#14260f;--green-border:#16a34a;--green-text:#86efac;
  }}

  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
  .app{max-width:480px;margin:0 auto;padding:14px;display:flex;flex-direction:column;gap:10px}

  .theme-btn{
    flex:0 0 36px;height:36px;
    border:1px solid var(--border2);border-radius:var(--radius-sm);
    background:var(--surface);color:var(--text2);font-size:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;transition:all .15s;
  }
  .theme-btn:active{transform:scale(.93)}

  .paste-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .paste-header{padding:8px 12px 0}
  .paste-label{font-size:12px;color:var(--text3);font-weight:500}
  .paste-ta{width:100%;min-height:90px;max-height:180px;padding:6px 12px 10px;
    border:none;outline:none;resize:none;font-size:13px;line-height:1.5;
    color:var(--text);background:transparent;font-family:inherit;}
  .paste-ta::placeholder{color:var(--text3)}

  .editor-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}

  .row{display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:48px;position:relative}
  .row:last-child{border-bottom:none}
  .row.focused{background:var(--blue-bg)}
  .row.error{background:var(--red-bg) !important}
  .row.error .row-label{color:var(--red-text)}
  .row.error .ri{color:var(--red-text)}
  .row.error .ri::placeholder{color:var(--red-text);opacity:.7}

  .row-left{flex:1;display:flex;align-items:center;padding:8px 12px;min-width:0;gap:0}
  .row-label{font-size:14px;color:var(--text2);white-space:nowrap;flex-shrink:0}
  .row-suffix{font-size:14px;color:var(--text2);white-space:nowrap;flex-shrink:0}

  .ri{border:none;outline:none;background:transparent;font-size:14px;color:var(--text);
      font-family:inherit;padding:0;caret-color:var(--blue-text);}
  .ri::placeholder{color:var(--text3)}
  .ri-flex{flex:1;min-width:50px}
  .ri-num{width:64px}
  .ri-gia{width:90px}

  .row-chips{display:flex;gap:4px;padding:0 10px 0 4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;align-items:center}
  .mc{padding:4px 10px;border:1px solid var(--border2);border-radius:12px;font-size:12px;
      cursor:pointer;background:var(--bg);color:var(--text2);transition:all .15s;
      -webkit-tap-highlight-color:transparent;user-select:none;white-space:nowrap}
  .mc.on{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue-text);font-weight:600}
  .mc.dim{opacity:.35;pointer-events:none}

  .mota-wrap{flex-direction:column;align-items:flex-start;padding:8px 12px 10px}
  .mota-top{display:flex;align-items:center;width:100%;gap:4px;margin-bottom:6px}
  .mota-chips{display:flex;flex-wrap:wrap;gap:4px}

  .lau-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
  .lau-dropdown-wrap{position:relative}
  .lau-menu{
    display:none;position:absolute;left:0;top:calc(100% + 4px);z-index:50;
    background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);
    overflow:hidden;min-width:80px;box-shadow:0 4px 12px rgba(0,0,0,.12);
  }
  .lau-menu span{display:block;padding:7px 14px;font-size:12px;color:var(--text);cursor:pointer;-webkit-tap-highlight-color:transparent}
  .lau-menu span:hover,.lau-menu span:active{background:var(--blue-bg);color:var(--blue-text)}
  .lau-menu.open{display:block}

  .card-wrap{position:relative;margin-right:46px}
  .side-col{position:absolute;right:-46px;top:0;bottom:0;width:36px;display:flex;flex-direction:column;gap:6px;padding:6px 0}
  .side-btn{
    flex:1;border:1px solid var(--border2);border-radius:var(--radius-sm);
    background:var(--surface);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;transition:all .15s;user-select:none;
    writing-mode:vertical-rl;text-orientation:mixed;letter-spacing:1px;
  }
  .side-btn:active{transform:scale(.93)}
  .side-btn.s-clear{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
  .side-btn.s-copy{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue-text)}
  .side-btn.s-moi{background:var(--surface);border-color:var(--border2);color:var(--text2)}
  .side-btn.s-moi.on{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue-text)}
  .side-btn.s-paste{background:var(--green-bg);border-color:var(--green-border);color:var(--green-text)}
  .side-btn.s-xclear{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
  .side-btn.s-nav{font-size:15px;writing-mode:horizontal-tb;flex:0 0 36px}
  .side-btn.s-nav:active{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue-text)}

      .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;
    white-space:nowrap;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
  [data-theme='dark'] .toast{background:#fff;color:#111}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">

  <div class="card-wrap">
    <div class="editor-card" id="editor-card">

      <div class="row" id="row-diachi">
        <div class="row-left">
          <span class="row-label">рҹ“Қ&nbsp;</span>
          <input class="ri ri-flex" id="inp-diachi" placeholder="Дҗб»Ӣa chб»ү"
            spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">
        </div>
      </div>

      <div class="row mota-wrap" id="row-gia">
        <div class="mota-top">
          <span class="row-label">рҹ’° GiГЎ:&nbsp;</span>
          <input class="ri ri-gia" id="inp-gia" placeholder="GiГЎ"
            spellcheck="false" autocomplete="off">
          <span class="row-suffix">&nbsp;вҖ“&nbsp;</span>
          <span id="mota-preview" style="font-size:14px;color:var(--text3);font-style:italic;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{MГҙ tбәЈ}</span>
        </div>
        <div class="mota-chips" id="mota-chips"></div>
        <div class="lau-row">
          <div class="lau-dropdown-wrap">
            <span class="mc" id="lau-btn" onclick="toggleLauMenu()">Trб»Үt в–ҫ</span>
            <div class="lau-menu" id="lau-menu">
              <span onclick="setLau('Trб»Үt')">Trб»Үt</span>
              <span onclick="setLau('Lбә§u 1')">Lбә§u 1</span>
              <span onclick="setLau('Lбә§u 2')">Lбә§u 2</span>
              <span onclick="setLau('Lбә§u 3')">Lбә§u 3</span>
              <span onclick="setLau('Lбә§u 4')">Lбә§u 4</span>
              <span onclick="setLau('Lбә§u 5')">Lбә§u 5</span>
              <span onclick="setLau('Lбә§u 6')">Lбә§u 6</span>
              <span onclick="setLau('Lбә§u 7')">Lбә§u 7</span>
              <span onclick="setLau('Lбә§u 8')">Lбә§u 8</span>
              <span onclick="setLau('Lбә§u 9')">Lбә§u 9</span>
            </div>
          </div>
          <span class="mc on" id="thang-btn" onclick="toggleThang()">Thang bб»ҷ</span>
        </div>
      </div>

      <div class="row" id="row-dien">
        <div class="row-left">
          <span class="row-label">вҡЎ Дҗiб»Үn:&nbsp;</span>
          <input class="ri ri-num" id="inp-dien" placeholder="GiГЎ"
            spellcheck="false" autocomplete="off">
          <span class="row-suffix">k/Kwh</span>
        </div>
      </div>

      <div class="row" id="row-nuoc">
        <div class="row-left">
          <span class="row-label">рҹ’§ NЖ°б»ӣc:&nbsp;</span>
          <input class="ri ri-num" id="inp-nuoc" placeholder="GiГЎ"
            spellcheck="false" autocomplete="off">
          <span class="row-suffix" id="suf-nuoc">k/ngЖ°б»қi</span>
        </div>
        <div class="row-chips">
          <span class="mc on" id="nuoc-nguoi" onclick="setUnit('nuoc','ngЖ°б»қi',this)">ngЖ°б»қi</span>
          <span class="mc"    id="nuoc-m3"    onclick="setUnit('nuoc','m3',this)">mВі</span>
        </div>
      </div>

      <div class="row" id="row-dv">
        <div class="row-left">
          <span class="row-label">рҹӣӢпёҸ Dб»Ӣch vб»Ҙ:&nbsp;</span>
          <input class="ri ri-num" id="inp-dv" placeholder="GiГЎ"
            spellcheck="false" autocomplete="off">
          <span class="row-suffix" id="suf-dv">k/phГІng</span>
        </div>
        <div class="row-chips">
          <span class="mc on" id="dv-phong" onclick="setUnit('dv','phГІng',this)">phГІng</span>
          <span class="mc"    id="dv-nguoi" onclick="setUnit('dv','ngЖ°б»қi',this)">ngЖ°б»қi</span>
        </div>
      </div>

      <div class="row" id="row-xe">
        <div class="row-left">
          <span class="row-label">рҹҸҚпёҸ Xe:&nbsp;</span>
          <input class="ri ri-num" id="inp-xe" placeholder="GiГЎ"
            spellcheck="false" autocomplete="off">
          <span class="row-suffix" id="suf-xe">k/xe</span>
        </div>
        <div class="row-chips">
          <span class="mc" id="xe-0" onclick="setXe('free xe',this)">free</span>
          <span class="mc" id="xe-1" onclick="setXe('free 1 xe',this)">free 1</span>
          <span class="mc" id="xe-2" onclick="setXe('free 2 xe',this)">free 2</span>
        </div>
      </div>

    </div>

    <div class="side-col">
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()"></button>
      <button class="side-btn s-moi" id="btn-moi" onclick="toggleMoi()">Dб»ұ ГЎn mб»ӣi</button>
      <button class="side-btn s-clear" onclick="clearAll()">XГіa trбәҜng</button>
      <button class="side-btn s-copy" onclick="copyText()">Sao chГ©p</button>
      <button class="side-btn s-nav" onclick="navPrev()">в–І</button>
    </div>
  </div>

  <div class="card-wrap">
    <div class="paste-card" id="paste-card">
      <textarea class="paste-ta" id="paste-ta" placeholder="DГЎn nб»ҷi dung phГІng trб»Қ vГ o Д‘Гўy..."></textarea>
    </div>
    <div class="side-col">
      <button class="side-btn s-paste" onclick="doPaste()">DГЎn</button>
      <button class="side-btn s-xclear" onclick="clearPaste()">вң• XГіa</button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const MOTA_OPTS = ['1PN','2PN','1PK','Studio','Duplex','Ban cГҙng','Cб»ӯa sб»•','Cб»ӯa sб»• trб»қi','TГЎch bбәҝp','MГЎy giбә·t riГӘng',];
const ADDR_LOWER = new Set(['Д‘Ж°б»қng','quбәӯn','phЖ°б»қng','hбә»m','ngГө','xГЈ','thб»Ӣ','tб»•','vГ ','sб»‘','tбәЎi']);
const NAV_IDS = ['inp-diachi','inp-gia','inp-dien','inp-nuoc','inp-dv','inp-xe'];
const REQUIRED_ROWS = ['row-diachi','row-gia','row-dien','row-nuoc','row-dv','row-xe'];

let nuocUnit = 'ngЖ°б»қi', dvUnit = 'phГІng', xeMode = null;
let lauVal = 'Trб»Үt', thangVal = 'Thang bб»ҷ', moiOn = false;

initTheme();
renderMotaChips();
requestAnimationFrame(() => document.getElementById('inp-diachi').focus());

function setFocusedRow(inp){
  document.querySelectorAll('.row').forEach(r => r.classList.remove('focused'));
  if(inp){ const row = inp.closest('.row'); if(row) row.classList.add('focused'); }
}
NAV_IDS.forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('focus', () => { clearError(el.closest('.row')); setFocusedRow(el); });
  el.addEventListener('blur', () => {
    setTimeout(()=>{ const a = document.activeElement; if(!a||!a.classList.contains('ri')) setFocusedRow(null); },50);
  });
});

NAV_IDS.forEach((id, i) => {
  document.getElementById(id).addEventListener('keydown', e => {
    if(e.key !== 'Enter') return; e.preventDefault();
    const next = NAV_IDS[i+1]; if(next) document.getElementById(next).focus();
  });
});
function navPrev(){
  const a = document.activeElement, idx = NAV_IDS.indexOf(a&&a.id);
  if(idx > 0) document.getElementById(NAV_IDS[idx-1]).focus();
  else if(idx === -1) document.getElementById(NAV_IDS[0]).focus();
}

function renderMotaChips(){
  document.getElementById('mota-chips').innerHTML =
    MOTA_OPTS.map(o=>`<span class="mc" onclick="toggleMota(this)">${o}</span>`).join('');
}
function toggleMota(el){ el.classList.toggle('on'); updateMotaPreview(); }
function getMotaVal(){ return [...document.querySelectorAll('#mota-chips .mc.on')].map(c=>c.textContent).join(', '); }
function updateMotaPreview(){
  const v = getMotaVal(), el = document.getElementById('mota-preview');
  el.textContent = v||'{MГҙ tбәЈ}'; el.style.color = v?'var(--text)':'var(--text3)'; el.style.fontStyle = v?'normal':'italic';
}

function setUnit(type, val, el){
  const isNuoc = type==='nuoc';
  if(isNuoc){ nuocUnit=val; document.getElementById('suf-nuoc').textContent='k/'+val; }
  else      { dvUnit=val;   document.getElementById('suf-dv').textContent='k/'+val; }
  const prefix = isNuoc?'nuoc':'dv';
  document.querySelectorAll('[id^="'+prefix+'-"]').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}

function setXe(mode, el){
  const inp=document.getElementById('inp-xe'), suf=document.getElementById('suf-xe');
  if(xeMode===mode){ xeMode=null; document.querySelectorAll('[id^="xe-"]').forEach(c=>c.classList.remove('on','dim')); inp.disabled=false; inp.value=''; suf.textContent='k/xe'; inp.focus(); return; }
  xeMode=mode; document.querySelectorAll('[id^="xe-"]').forEach(c=>c.classList.remove('on','dim')); el.classList.add('on'); inp.value=''; inp.disabled=true; suf.textContent=mode;
}
document.getElementById('inp-xe').addEventListener('input',()=>{
  if(document.getElementById('inp-xe').value&&xeMode){ xeMode=null; document.querySelectorAll('[id^="xe-"]').forEach(c=>c.classList.remove('on','dim')); document.getElementById('suf-xe').textContent='k/xe'; }
});

function capitalizeAddr(str){
  return str.split(' ').map((w,i)=>{ if(!w)return w; if(ADDR_LOWER.has(w.toLowerCase())&&i>0)return w.toLowerCase(); return w.charAt(0).toUpperCase()+w.slice(1); }).join(' ');
}
document.getElementById('inp-diachi').addEventListener('blur',function(){ if(this.value)this.value=capitalizeAddr(this.value); });

function toggleLauMenu(){ document.getElementById('lau-menu').classList.toggle('open'); }
function setLau(val){ lauVal=val; document.getElementById('lau-btn').textContent=val+' в–ҫ'; document.getElementById('lau-menu').classList.remove('open'); }
function toggleThang(){
  thangVal = thangVal==='Thang bб»ҷ'?'Thang mГЎy':'Thang bб»ҷ';
  const btn = document.getElementById('thang-btn'); btn.textContent=thangVal; btn.classList.toggle('on',thangVal==='Thang bб»ҷ');
}
document.addEventListener('click', e=>{ if(!e.target.closest('.lau-dropdown-wrap')) document.getElementById('lau-menu').classList.remove('open'); });

function toggleMoi(){ moiOn=!moiOn; document.getElementById('btn-moi').classList.toggle('on',moiOn); }

function markError(rowId){ document.getElementById(rowId) && document.getElementById(rowId).classList.add('error'); }
function clearError(row){ row && row.classList.remove('error'); }
function clearAllErrors(){ REQUIRED_ROWS.forEach(id=>{ const r=document.getElementById(id); if(r)r.classList.remove('error'); }); }

function buildText(){
  const diachi=document.getElementById('inp-diachi').value.trim();
  const gia=document.getElementById('inp-gia').value.trim();
  const dien=document.getElementById('inp-dien').value.trim();
  const nuoc=document.getElementById('inp-nuoc').value.trim();
  const dv=document.getElementById('inp-dv').value.trim();
  const xeVal=document.getElementById('inp-xe').value.trim();
  const mota=getMotaVal();
  const xeLine = xeMode ? xeMode : (xeVal ? xeVal+'k/xe' : '{GiГЎ xe}k/xe');
  const lines=[
    'рҹ“Қ'+(diachi||'{Дҗб»Ӣa chб»ү}'),
    'рҹ’° GiГЎ: '+(gia||'{GiГЎ}')+' - '+(mota||'{MГҙ tбәЈ}')+' - '+lauVal+', '+thangVal,
    'вҡЎ Дҗiб»Үn: '+(dien||'{GiГЎ Д‘iб»Үn}')+'k/Kwh',
    'рҹ’§ NЖ°б»ӣc: '+(nuoc||'{GiГЎ nЖ°б»ӣc}')+'k/'+nuocUnit,
    'рҹӣӢпёҸ Dб»Ӣch vб»Ҙ: '+(dv==='free'?'free':(dv||'{PhГӯ dб»Ӣch vб»Ҙ}')+(dv?'k/'+dvUnit:'')),
    'рҹҸҚпёҸ Xe: '+xeLine,
  ];
  if(moiOn) lines.unshift('Dб»ұ ГЎn mб»ӣi');
  return lines.join('\n');
}

function copyText(){
  if(document.activeElement&&typeof document.activeElement.blur==='function') document.activeElement.blur();
  const text=buildText();
  if(navigator.clipboard){ navigator.clipboard.writeText(text).then(()=>toast('вң… ДҗГЈ sao chГ©p!')).catch(()=>fallbackCopy(text)); }
  else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); toast('вң… ДҗГЈ sao chГ©p!'); } catch{ toast('KhГҙng sao chГ©p Д‘Ж°б»Јc'); }
  document.body.removeChild(ta);
}

function clearAll(focusDiachi=true){
  clearAllErrors();
  NAV_IDS.forEach(id=>{ const el=document.getElementById(id); el.value=''; el.disabled=false; });
  xeMode=null; document.querySelectorAll('[id^="xe-"]').forEach(c=>c.classList.remove('on','dim')); document.getElementById('suf-xe').textContent='k/xe';
  document.querySelectorAll('#mota-chips .mc').forEach(c=>c.classList.remove('on')); updateMotaPreview();
  nuocUnit='ngЖ°б»қi'; document.getElementById('nuoc-nguoi').classList.add('on'); document.getElementById('nuoc-m3').classList.remove('on'); document.getElementById('suf-nuoc').textContent='k/ngЖ°б»қi';
  dvUnit='phГІng'; document.getElementById('dv-phong').classList.add('on'); document.getElementById('dv-nguoi').classList.remove('on'); document.getElementById('suf-dv').textContent='k/phГІng';
  lauVal='Trб»Үt'; document.getElementById('lau-btn').textContent='Trб»Үt в–ҫ';
  thangVal='Thang bб»ҷ'; const tb=document.getElementById('thang-btn'); tb.textContent='Thang bб»ҷ'; tb.classList.add('on');
  moiOn=false; document.getElementById('btn-moi').classList.remove('on');
  if(focusDiachi){ const f=document.getElementById('inp-diachi'); f.focus(); f.click(); }
}

async function doPaste(){
  try{
    const text = await navigator.clipboard.readText();
    document.getElementById('paste-ta').value = text;
    if(text.trim()) doParseAI();
  } catch{
    document.getElementById('paste-ta').focus();
    toast('BбәҘm giб»Ҝ вҶ’ DГЎn vГ o Гҙ trГӘn');
  }
}
function clearPaste(){
  document.getElementById('paste-ta').value = '';
  clearAll(false);
}
let parseTimer = null;
document.getElementById('paste-ta').addEventListener('input', () => {
  clearTimeout(parseTimer);
  parseTimer = setTimeout(() => {
    const v = document.getElementById('paste-ta').value.trim();
    if(v) doParseAI();
  }, 400);
});

// в”Җв”Җ DV keyword regex (dГ№ng chung cho cбәЈ test dГІng lбә«n bбәҜt giГЎ trб»Ӣ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Khб»ӣp: dб»Ӣch vб»Ҙ, phГӯ dб»Ӣch, dv, dvu,
//        phГӯ Qly, phГӯ Q.lГҪ, phГӯ QlГҪ, phГӯ quбәЈn lГҪ  (+tuб»і chб»Қn "chung" phГӯa sau)
//        phГӯ dv, phГӯ d.v (dv viбәҝt tбәҜt sau "phГӯ")
const DV_KW = /d[б»Ӣi]ch\s*v[б»Ҙu]|ph[iГӯ]\s*d[б»Ӣi]ch|(?<![A-Za-z\d])dvu(?![A-Za-z\d])|(?<![A-Za-z\d])dv[б»Ҙu](?![A-Za-z\d])|ph[iГӯ]\s*d\.?v\.?\b|(?<![A-Za-z])dv(?:[:\s\/]|$)|p\.?d\.?v\.?\b|ph[iГӯ]\s*(?:qu[aбәЈ]n\s*l[yГҪ]|q\.?l[yГҪ]|qly)\s*(?:chung)?/i;

function doParseAI(){
  const raw = document.getElementById('paste-ta').value.trim();
  if(!raw){ toast('ChЖ°a cГі nб»ҷi dung Д‘б»ғ phГўn tГӯch'); return; }
  clearAllErrors();

  // Chuбә©n hoГЎ: nбәҝu dбәҘu + dГӯnh liб»Ғn vб»ӣi nб»ҷi dung trЖ°б»ӣc (khГҙng cГі xuб»‘ng dГІng) thГ¬ tГЎch ra
  const normalized = raw.replace(/([^\s\n])\+\s*/g, '$1\n+');
  const lines = normalized.split('\n').map(l=>l.trim()).filter(Boolean);
  const text = raw.toLowerCase();
  const p = { diachi:null, gia:null, dien:null, nuoc:null, nuoc_unit:'ngЖ°б»қi',
               dv:null, dv_unit:'phГІng', xe:null, lau:null, thang:'Thang bб»ҷ', mota:[] };

  function toK(s){
    if(!s) return null;
    s = s.replace(/\s/g,'');
    // Dang 3k8 = 3.8k (vi du: Dien 3k8)
    const kDotK = s.match(/^(\d+)k(\d+)$/i);
    if(kDotK) return parseFloat(kDotK[1] + '.' + kDotK[2]);
    // Truong hop da co chu k o cuoi: "4k", "4.5k", "200k"
    const kMatch = s.match(/^(\d+(?:[.,]\d+)?)k$/i);
    if(kMatch) return parseFloat(kMatch[1].replace(',','.'));
    // Chuбә©n hГіa dбәҘu ngДғn hГ ng nghГ¬n kiб»ғu VN: 4.000вҶ’4000, 100.000вҶ’100000, 200.000вҶ’200000
    // Nhбәӯn dбәЎng: chuб»—i chб»ү cГі chб»Ҝ sб»‘ + dбәҘu chбәҘm/phбә©y ngДғn hГ ng nghГ¬n (nhГіm 3 chб»Ҝ sб»‘)
    const cleanNum = s.replace(/[.,](?=\d{3}(?:[.,]|$))/g, '');
    const num = parseFloat(cleanNum.replace(',','.'));
    if(isNaN(num)) return null;
    if(num >= 1000) return num / 1000;
    return num;
  }

  // в”Җв”Җ Дҗб»Ӣa chб»ү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const addrRegex = /(?:Д‘[б»Ӣi]a\s*ch[б»үi](?:\s*d[б»ұu]\s*[aГЎ]n)?\s*[:пјҡ]\s*)?(\d+[A-Za-z]*(?:[\/\-]\d+[A-Za-z]*)*\s+[A-ZГҖГҒбәўГғбә ДӮбә®бә¶бәҙбәІбә¶ГӮбәӨбәҰбәЁбәӘбә¬ДҗГҲГүбәәбәјбәёГҠбәҫб»Җб»Ӯб»„б»ҶГҢГҚб»ҲДЁб»ҠГ’Г“б»ҺГ•б»ҢГ”б»җб»’б»”б»–б»ҳЖ б»ҡб»ңб»һб» б»ўГҷГҡб»ҰЕЁб»ӨЖҜб»Ёб»Әб»¬б»®б»°б»ІГқб»¶б»ёб»ҙ][^\n]*)/;
  for(const line of lines){
    if(/gi[aГЎ]|Д‘i[eб»Ү]n|n[Ж°u][oб»қб»ӣ]c|d[б»Ӣi]ch\s*v|xe\s*[:\d]|c[oб»Қ]c|ph[iГӯ]\s*(?:dv|d[б»Ӣi]ch)|hh\b|quy\s*m[oГҙ]|mГЈ\s*p/i.test(line)) continue;
    const m = line.match(addrRegex);
    if(m){
        let addr = m[1].replace(/^\s*[\u{1F300}-\u{1FFFF}\u{2600}-\u{26FF}]\s*/u,'').trim();
        // Bб»Ҹ sб»‘ nhГ  thuбә§n sб»‘ б»ҹ Д‘бә§u (vd: "25/6 Cб»ӯu Long" вҶ’ "Cб»ӯu Long")
        // Giб»Ҝ lбәЎi nбәҝu cГі chб»Ҝ cГЎi dГӯnh vГ o sб»‘ (vd: "2F Lam SЖЎn" вҶ’ giб»Ҝ nguyГӘn)
        // KhГҙng strip nбәҝu token Д‘бә§u lГ  chб»Ҝ-sб»‘ (2F, 3A, ...) вҶ’ chб»ү strip khi token Д‘бә§u lГ  thuбә§n sб»‘
        addr = addr.replace(/^(\d+[A-Za-z]?(?:[\/-]\d+[A-Za-z]*)*)\s+(?=[A-ZГҖГҒбәўГғбә ДӮбә®бә¶бәҙбәІбә¶ГӮбәӨбәҰбәЁбәӘбә¬Дҗ])/u, (_, token) => {
          // Bб»Ҹ sб»‘ nhГ  thuбә§n sб»‘ hoбә·c dбәЎng 2F, 3A (sб»‘ + 1 kГҪ tб»ұ chб»Ҝ)
          // Chб»ү giб»Ҝ nбәҝu token cГі nhiб»Ғu hЖЎn 1 chб»Ҝ cГЎi (nhЖ° tГӘn riГӘng)
          return /^[0-9]+[A-Za-z]?(?:\/[0-9]+[A-Za-z]?)*$/.test(token) ? '' : token + ' ';
        });
        p.diachi = addr;
        break;
      }
  }

  // в”Җв”Җ MГЈ phГІng вҶ’ lбә§u в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const roomMatch = raw.match(/(?:mГЈ\s*)?(?:ph[oГІГі]ng|p\.?)\s*[:\s]*([A-Za-z]*)(\d{2,3})\b/i);
  if(roomMatch){
    const n = parseInt(roomMatch[2][0]);
    p.lau = n===0 ? 'Trб»Үt' : (n>=1&&n<=9 ? 'Lбә§u '+n : null);
  }
  if(!p.lau){
    const floorMatch = raw.match(/\bl[aбә§]u\s*(\d)\b/i);
    if(floorMatch){ const n=parseInt(floorMatch[1]); p.lau=n<=9?'Lбә§u '+n:null; }
  }
  if(!p.lau && /tr[eб»Ү]t/i.test(raw)) p.lau='Trб»Үt';

  // в”Җв”Җ Thang в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if(/thang\s*m[aГЎ]y/i.test(raw)) p.thang='Thang mГЎy';

  // в”Җв”Җ GiГЎ phГІng в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const EXCL = /c[oб»Қ]c|hoa\s*h[oб»“]ng|\bhh\b|t[oб»‘]i\s*thi[eб»ғ]u|d[б»Ӣi]ch\s*v[б»Ҙu]|ph[iГӯ]\s*(?:dv|d[б»Ӣi]ch)|n[Ж°u][oб»қб»ӣ]c|Д‘i[eб»Ү]n/i;
  for(const line of lines){
    if(EXCL.test(line)) continue;
    const giamMatch = line.match(/gi[aбәЈ]m\s+(\d+(?:[,.]\d+)?\s*tr\d*)/i);
    if(giamMatch){ p.gia = normalizeGia(giamMatch[1]); break; }
    const giaLabel = line.match(/^gi[aГЎ]\s*[:\s]+(\d+(?:[,.]\d+)?\s*tr\d*)/i);
    if(giaLabel){ p.gia = normalizeGia(giaLabel[1]); break; }
  }
  if(!p.gia){
    for(const line of lines){
      if(EXCL.test(line)) continue;
      const m = line.match(/\b(\d+(?:[,.]\d+)?tr\d*)\b/i);
      if(m){ p.gia = normalizeGia(m[1]); break; }
    }
  }

  // в”Җв”Җ Дҗiб»Үn в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  for(const line of lines){
    if(!/Д‘i[eб»Ү]n/i.test(line) && !/kw|k[yГҪ]/i.test(line)) continue;
    const m = line.match(/(\d+(?:[.,]\d{3})+)\s*Д‘?\s*[\/]\s*(?:kw[h]?|k[yГҪ])/i)
           || line.match(/(\d+(?:[.,]\d+)?)\s*k\s*[\/]\s*(?:kw[h]?|k[yГҪ])/i)
           || line.match(/(\d{4,})\s*Д‘?\s*[\/]\s*(?:kw[h]?|k[yГҪ])/i)
           || line.match(/Д‘i[eб»Ү]n\s*[:\s]\s*(\d+(?:[.,]\d{3})+)/i)
           || line.match(/Д‘i[eб»Ү]n\s+(\d+(?:[.,]\d{3})+)\s*Д‘/i)
           || line.match(/Д‘i[eб»Ү]n\s*[:\s*\s]?\s*(\d+k\d+)/i)
           || line.match(/Д‘i[eб»Ү]n\s*[:\s]\s*(\d+(?:[.,]\d+)?)\s*k/i)
           || line.match(/Д‘i[eб»Ү]n\s+(\d+(?:[.,]\d+)?)\s*k/i);
    if(m){ p.dien = toK(m[1]); break; }
  }
  if(!p.dien){
    const dm = raw.match(/(\d+(?:[.,]\d{3})+)\s*Д‘?\s*[\/]\s*(?:kw[h]?|k[yГҪ])/i)
            || raw.match(/Д‘i[eб»Ү]n\s*[:\s]?\s*(\d+k\d+)/i)
            || raw.match(/Д‘i[eб»Ү]n\s*[:\s]?\s*(\d+(?:[.,]\d{3})+)/i);
    if(dm) p.dien = toK(dm[1]);
  }

  // в”Җв”Җ NЖ°б»ӣc в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  for(const line of lines){
    if(!/n[Ж°u][oб»қб»ӣ]c/i.test(line)) continue;
    const m = line.match(/n[Ж°u][oб»қб»ӣ]c\s*[:\s]\s*(\d+(?:[.,]\d{3})+)\s*Д‘?\s*[\/]?\s*(ng[Ж°u][oб»қ]i|ng\.?|ngЖ°б»қi|m3|m[Ві3])?/i)
           || line.match(/n[Ж°u][oб»қб»ӣ]c\s+(\d+(?:[.,]\d{3})+)\s*Д‘?\s*[\/]?\s*(ng[Ж°u][oб»қ]i|ng\.?|ngЖ°б»қi|m3|m[Ві3])?/i)
           || line.match(/n[Ж°u][oб»қб»ӣ]c\s*[:\s]\s*(\d+(?:[.,]\d+)?)\s*k\s*[\/]?\s*(ng[Ж°u][oб»қ]i|ng\.?|ngЖ°б»қi|m3|m[Ві3])?/i)
           || line.match(/n[Ж°u][oб»қб»ӣ]c\s+(\d+(?:[.,]\d+)?)\s*k\s*[\/]?\s*(ng[Ж°u][oб»қ]i|ng\.?|ngЖ°б»қi|m3|m[Ві3])?/i)
           || line.match(/n[Ж°u][oб»қб»ӣ]c\s*[:\s]?\s*(\d+)\s*\/\s*(ng[Ж°u][oб»қ]i|ngЖ°б»қi|ng\.?|m3|m[Ві3])/i)
           || line.match(/n[Ж°u][oб»қб»ӣ]c\s+(\d+)\s*\/\s*(ng[Ж°u][oб»қ]i|ngЖ°б»қi|ng\.?|m3|m[Ві3])/i);
    if(m){
      p.nuoc = toK(m[1]);
      p.nuoc_unit = (m[2]||'').match(/m3|m[Ві3]/i) ? 'm3' : 'ngЖ°б»қi';
      break;
    }
  }

  // в”Җв”Җ Dб»Ӣch vб»Ҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Nhбәӯn ra: dб»Ӣch vб»Ҙ, phГӯ dб»Ӣch, dv, dvu,
  //          phГӯ Qly, phГӯ Q.lГҪ, phГӯ QlГҪ, phГӯ quбәЈn lГҪ  (+ tuб»і chб»Қn "chung")

// в”Җв”Җ Dб»Ӣch vб»Ҙ в”Җв”Җ
for (const line of lines) {
  if (!DV_KW.test(line)) continue;

  // Thб»ӯ bбәҜt giГЎ trЖ°б»ӣc вҖ” Д‘б»ғ trГЎnh nhбә§m "Free 2xe" cГ№ng dГІng thГ nh DV free
  const DV_KW_VAL = /d[б»Ӣi]ch\s*v[б»Ҙu]|dv[б»Ҙu]|dvu|(?<![A-Za-z\d])dv(?![A-Za-z\d])|p\.?d\.?v\.?|qu[aбәЈ]n\s*l[yГҪ]|q\.?l[yГҪ]|qly/i;
  const DV_KW_PAT = /(?:ph[iГӯ]\s*)?(?:d[б»Ӣi]ch\s*v[б»Ҙu]|dv[б»Ҙu]|dvu|(?<![A-Za-z\d])dv(?![A-Za-z\d])|p\.?d\.?v\.?|qu[aбәЈ]n\s*l[yГҪ]|q\.?l[yГҪ]|qly)/i;
  const m = line.match(
    new RegExp(DV_KW_PAT.source + /\s*(?:chung)?\s*[:\s]\s*(\d+(?:[.,]\d{3})+)\s*Д‘?\s*[\/]?\s*(ph[oГІГі]ng|ph\b|ng[Ж°u][oб»қ]i|ng\b|ngЖ°б»қi)?/.source, 'i')
  ) || line.match(
    new RegExp(DV_KW_PAT.source + /\s*(?:chung)?\s*[:\s]\s*(\d+(?:[.,]\d+)?)\s*k\s*[\/]?\s*(ph[oГІГі]ng|ph\b|ng[Ж°u][oб»қ]i|ng\b|ngЖ°б»қi)?/.source, 'i')
  ) || line.match(
    new RegExp(DV_KW_PAT.source + /\s*(?:chung)?\s+(\d+(?:[.,]\d{3})+)\s*Д‘?\s*[\/]?\s*(ph[oГІГі]ng|ph\b|ng[Ж°u][oб»қ]i|ng\b|ngЖ°б»қi)?/.source, 'i')
  ) || line.match(
    new RegExp(DV_KW_PAT.source + /\s*(?:chung)?\s+(\d+(?:[.,]\d+)?)\s*k\s*[\/]?\s*(ph[oГІГі]ng|ph\b|ng[Ж°u][oб»қ]i|ng\b|ngЖ°б»қi)?/.source, 'i')
  ) || line.match(
    new RegExp(DV_KW_PAT.source + /\s*(?:chung)?\s*[:\s]?\s*(\d+)\s*\/\s*(ph[oГІГі]ng|ph\b|ng[Ж°u][oб»қ]i|ngЖ°б»қi|ng\.?)/.source, 'i')
  );

  if (m) {
    p.dv = toK(m[1]);
    p.dv_unit = (m[2] || '').match(/ng[Ж°u]|ngЖ°б»қi/i)
      ? 'ngЖ°б»қi'
      : 'phГІng';
    break;
  }

  // Case: free / miб»…n phГӯ (chб»ү khi khГҙng cГі giГЎ)
  if (/free|mi[eб»…]n\s*ph[iГӯ]/i.test(line)) {
    p.dv = 'free';
    p.dv_unit = /ng[Ж°u][oб»қ]i|ngЖ°б»қi/i.test(line) ? 'ngЖ°б»қi' : 'phГІng';
    break;
  }
}
  // в”Җв”Җ Xe в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const XE_EXCL = /xe\s*Д‘iб»Үn|khГҙng\s*xe|cбәҘm\s*xe/i;
  // ЖҜu tiГӘn dГІng chuyГӘn vб»Ғ xe (cГі free/miб»…n/sб»‘ xe), trГЎnh dГІng mixed chб»©a dien/nuoc/dvu
  const XE_MIXED = /Д‘i[eб»Ү]n|n[Ж°u][oб»қб»ӣ]c|d[б»Ӣi]ch\s*v|dvu|dv[б»Ҙu]/i;
  const xeLine = lines.find(l=>/xe/i.test(l) && !XE_EXCL.test(l) &&
    /free|mi[eб»…]n|t[oб»‘]i\s*Д‘a|ch[б»үi]\s*nh[aбәӯ]n|\d+\s*k|\d+(?:[.,]\d{3})|\d+\s*(?:xe|c\b)/i.test(l) &&
    !XE_MIXED.test(l)
  ) || lines.find(l=>/xe/i.test(l) && !XE_EXCL.test(l) &&
    /free\s*\d+\s*(?:xe|c\b)|\d+\s*(?:xe|c\b)\s*free|free\s*\d+xe|\d+\s*xe\s*m[aГЎ]y/i.test(l)
  );
  if(xeLine){
    const toiDa = xeLine.match(/t[oб»‘]i\s*Д‘a\s*(\d+)\s*xe/i)
               || xeLine.match(/ch[б»үi]\s*nh[aбәӯ]n\s*(\d+)\s*xe/i);
    if(toiDa){ p.xe = 'free '+toiDa[1]+' xe'; }
    else{
      const num = xeLine.match(/free\s*(\d+)\s*(?:xe|chi[eбәҝ]c|cГЎi|c\b)/i)
               || xeLine.match(/(\d+)\s*(?:xe|chi[eбәҝ]c|c\b)\s*free/i)
               || xeLine.match(/(\d+)\s*xe\s*m[aГЎ]y/i)
               || xeLine.match(/xe\s*free\s*(\d+)\s*c\b/i);
      if(num) p.xe = 'free '+num[1]+' xe';
      else if(/free|mi[eб»…]n\s*ph[iГӯ]/i.test(xeLine)){
        const maxXe = xeLine.match(/t[oб»‘]i\s*Д‘a\s*(\d+)/i);
        p.xe = maxXe ? 'free '+maxXe[1]+' xe' : 'free xe';
      } else {
        const price = xeLine.match(/(\d+(?:[.,]\d{3})?)\s*k?\s*\/\s*(?:xe|chi[eбәҝ]c)/i)
                   || xeLine.match(/xe\s*[:\s]\s*(\d+(?:[.,]\d{3})+)\s*(?:Д‘|d)?\s*[\/]/i)
                   || xeLine.match(/xe\s*[:\s]\s*(\d+(?:[.,]\d+)?)\s*k/i);
        if(price) p.xe = toK(price[1]);  // lЖ°u sб»‘ thГҙi, suffix 'k/xe' Д‘ГЈ cГі sбәөn trong UI
        else p.xe = 'free xe';
      }
    }
  } else { p.xe = 'free xe'; }

  // в”Җв”Җ MГҙ tбәЈ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const motaMap = [
    {tags:['gГЎc lб»ӯng','gГЎc'],out:'GГЎc'},
    {tags:['ban cГҙng'],out:'Ban cГҙng'},
    {tags:['cб»ӯa sб»• trб»қi','giбәҝng trб»қi'],out:'Cб»ӯa sб»• trб»қi'},
    {tags:['cб»ӯa sб»•'],out:'Cб»ӯa sб»•'},
    {tags:['tГЎch bбәҝp','bбәҝp riГӘng'],out:'TГЎch bбәҝp'},
    {tags:['mГЎy giбә·t riГӘng'],out:'MГЎy giбә·t riГӘng'},
    {tags:['mГЎy sбәҘy'],out:'MГЎy sбәҘy'},
    {tags:['khoГЎ vГўn tay','khГіa vГўn tay','vГўn tay'],out:'KhoГЎ vГўn tay'},
    {tags:['thang mГЎy'],out:'Thang mГЎy'},
    {tags:['thЖ°б»ҹng nГіng','thuong nong'],out:'ThЖ°б»ҹng nГіng'},
    {tags:['studio'],out:'Studio'},
    {tags:['1 phГІng ngб»§','1pn'],out:'1PN'},
    {tags:['2 phГІng ngб»§','2pn'],out:'2PN'},
    {tags:['1 phГІng khГЎch','1pk'],out:'1PK'},
  ];
  motaMap.forEach(({tags,out})=>{ if(tags.some(t=>text.includes(t))) p.mota.push(out); });

  applyParsed(p);
}

function normalizeGia(s){
  return s.replace(/\s+/g,'').toLowerCase()
    .replace(/tri[eб»Ү]u|triГӘu/g,'tr').replace(/[,]/g,'.');
}

function applyParsed(p){
  clearAllErrors();

  if(p.diachi){ document.getElementById('inp-diachi').value = capitalizeAddr(p.diachi); }
  else markError('row-diachi');

  if(p.gia){ document.getElementById('inp-gia').value = p.gia; }
  else markError('row-gia');

  if(p.dien !== null && p.dien !== undefined){ document.getElementById('inp-dien').value = p.dien; }
  else markError('row-dien');

  if(p.nuoc !== null && p.nuoc !== undefined){
    document.getElementById('inp-nuoc').value = p.nuoc;
    const unit = p.nuoc_unit === 'm3' ? 'm3' : 'ngЖ°б»қi';
    nuocUnit = unit;
    document.getElementById('suf-nuoc').textContent = 'k/'+unit;
    document.getElementById('nuoc-nguoi').classList.toggle('on', unit==='ngЖ°б»қi');
    document.getElementById('nuoc-m3').classList.toggle('on', unit==='m3');
  } else markError('row-nuoc');

  if(p.dv !== null && p.dv !== undefined){
    const isFree = p.dv === 'free';
    document.getElementById('inp-dv').value = isFree ? 'free' : (p.dv === 0 ? '' : p.dv);
    const unit = p.dv_unit === 'ngЖ°б»қi' ? 'ngЖ°б»қi' : 'phГІng';
    dvUnit = unit;
    document.getElementById('suf-dv').textContent = isFree ? '' : 'k/'+unit;
    document.getElementById('dv-phong').classList.toggle('on', !isFree && unit==='phГІng');
    document.getElementById('dv-nguoi').classList.toggle('on', !isFree && unit==='ngЖ°б»қi');
  } else markError('row-dv');

  if(p.xe !== null && p.xe !== undefined){
    if(typeof p.xe === 'string' && p.xe.startsWith('free')){
      const freeMap = {'free xe':'xe-0','free 1 xe':'xe-1','free 2 xe':'xe-2'};
      const el = document.getElementById(freeMap[p.xe] || 'xe-0');
      if(el) setXe(p.xe, el);
    } else {
      document.getElementById('inp-xe').value = p.xe;
      xeMode = null;
      document.querySelectorAll('[id^="xe-"]').forEach(c=>c.classList.remove('on','dim'));
      document.getElementById('suf-xe').textContent = 'k/xe';
    }
  } else markError('row-xe');

  const validLau = ['Trб»Үt','Lбә§u 1','Lбә§u 2','Lбә§u 3','Lбә§u 4','Lбә§u 5','Lбә§u 6','Lбә§u 7','Lбә§u 8','Lбә§u 9'];
  if(p.lau && validLau.includes(p.lau)){ setLau(p.lau); }
  else { lauVal='Trб»Үt'; document.getElementById('lau-btn').textContent='Trб»Үt в–ҫ'; }

  thangVal = p.thang === 'Thang mГЎy' ? 'Thang mГЎy' : 'Thang bб»ҷ';
  const tb = document.getElementById('thang-btn'); tb.textContent=thangVal; tb.classList.toggle('on', thangVal==='Thang bб»ҷ');

  document.querySelectorAll('#mota-chips .mc').forEach(c=>c.classList.remove('on'));
  if(p.mota && p.mota.length){
    p.mota.forEach(tag=>{
      document.querySelectorAll('#mota-chips .mc').forEach(c=>{ if(c.textContent===tag) c.classList.add('on'); });
    });
  }
  updateMotaPreview();

  const missingNames = [];
  const missingFocus = [];
  if(!p.diachi){ missingNames.push('Д‘б»Ӣa chб»ү'); missingFocus.push('inp-diachi'); }
  if(!p.gia)   { missingNames.push('giГЎ');      missingFocus.push('inp-gia'); }
  if(!p.dien)  { missingNames.push('Д‘iб»Үn');     missingFocus.push('inp-dien'); }
  if(!p.nuoc)  { missingNames.push('nЖ°б»ӣc');     missingFocus.push('inp-nuoc'); }
  if(p.dv === null || p.dv === undefined){ missingNames.push('dб»Ӣch vб»Ҙ');  missingFocus.push('inp-dv'); }
  if(!p.lau)   { missingNames.push('lбә§u'); }

  if(missingNames.length){
    toast('вҡ пёҸ Thiбәҝu: '+missingNames.join(', '));
    if(missingFocus.length){
      const el = document.getElementById(missingFocus[0]);
      if(el){ el.focus(); el.click(); }
    }
  } else {
    toast('вң… ДҗГЈ Д‘iб»Ғn Д‘бә§y Д‘б»§!');
  }
}

function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t); localStorage.setItem('prt_theme',t);
  const b=document.getElementById('theme-btn'); if(b) b.textContent=t==='dark'?'вҳҖпёҸ':'рҹҢҷ';
}
function toggleTheme(){ applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); }
function initTheme(){
  const s=localStorage.getItem('prt_theme'); if(s){ applyTheme(s); return; }
  applyTheme(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
}
</script>
